name: Send newsletter for new articles

on:
  workflow_dispatch:
    inputs:
      slug:
        description: 'Article slug (filename without .mdx)'
        required: false
  push:
    branches: [main]
    paths:
      - 'src/content/en/*.mdx'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect new articles
        id: detect
        run: |
          INPUT_SLUG="${{ github.event.inputs.slug }}"

          if [ -n "$INPUT_SLUG" ]; then
            FILE="src/content/en/${INPUT_SLUG}.mdx"
            if [ ! -f "$FILE" ]; then
              echo "Article not found: $FILE"
              echo "found=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          else
            NEW_FILES=$(git diff --name-only --diff-filter=A HEAD~1 HEAD -- 'src/content/en/*.mdx')
            if [ -z "$NEW_FILES" ]; then
              echo "No new articles found"
              echo "found=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            FILE=$(echo "$NEW_FILES" | head -1)
          fi

          SLUG=$(basename "$FILE" .mdx)
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"
          echo "found=true" >> "$GITHUB_OUTPUT"

          FRONTMATTER=$(sed -n '/^---$/,/^---$/p' "$FILE" | sed '1d;$d')
          TITLE=$(echo "$FRONTMATTER" | yq -r '.title')
          DESCRIPTION=$(echo "$FRONTMATTER" | yq -r '.description')

          {
            echo "title<<EOF"
            echo "$TITLE"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          {
            echo "description<<EOF"
            echo "$DESCRIPTION"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          echo "New article detected: $TITLE ($SLUG)"

      - name: Send newsletter
        if: steps.detect.outputs.found == 'true'
        env:
          SLUG: ${{ steps.detect.outputs.slug }}
          TITLE: ${{ steps.detect.outputs.title }}
          DESCRIPTION: ${{ steps.detect.outputs.description }}
        run: |
          PAYLOAD=$(jq -n \
            --arg slug "$SLUG" \
            --arg title "$TITLE" \
            --arg description "$DESCRIPTION" \
            '{slug: $slug, title: $title, description: $description}')
          curl -sf -X POST "${{ secrets.SITE_URL }}/api/newsletter" \
            -H "Authorization: Bearer ${{ secrets.NEWSLETTER_SECRET }}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
